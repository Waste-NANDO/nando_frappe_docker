# Run materialize-assets.sh on deploy so frontend/nginx serves bundles from the shared sites volume.
# Set MATERIALIZE_ASSETS_ON_START=0 in env to skip (faster up; run setup-assets.sh after).
#
# Bind-mount scripts from the repo (paths relative to repo root — run compose from repo root).
services:
  configurator:
    volumes:
      - ./nando-deployment/materialize-assets.sh:/home/frappe/frappe-bench/materialize-assets.sh:ro
      - ./nando-deployment/sync-assets-manifest.sh:/home/frappe/frappe-bench/sync-assets-manifest.sh:ro
    environment:
      MATERIALIZE_ASSETS_ON_START: ${MATERIALIZE_ASSETS_ON_START:-1}
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        if [[ -n "$$FRAPPE_HOST_NAME" ]]; then bench set-config -g host_name "$$FRAPPE_HOST_NAME"; fi;
        if [[ "$${MATERIALIZE_ASSETS_ON_START:-1}" = "1" ]]; then
          FORCE_MATERIALIZE=1 bash /home/frappe/frappe-bench/materialize-assets.sh ||
            bash /home/frappe/frappe-bench/sync-assets-manifest.sh;
        fi

  backend:
    volumes:
      - ./nando-deployment/materialize-assets.sh:/home/frappe/frappe-bench/materialize-assets.sh:ro
      - ./nando-deployment/sync-assets-manifest.sh:/home/frappe/frappe-bench/sync-assets-manifest.sh:ro
